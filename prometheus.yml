global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Load alerting rules
rule_files:
  - /etc/prometheus/rules/*.yml

# Alertmanager (optional but recommended for production)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093   # Change if using external Alertmanager

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # Abena - Main Health Probe Exporter
  - job_name: 'abena'
    metrics_path: /metrics
    static_configs:
      - targets: ['abena:9090']
    labels:
      job: abena
      environment: production
      team: sre

  # Example: Additional internal services (expand as needed)
  # - job_name: 'internal-services'
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ['other-service:9090']

  # Node Exporter (system metrics) - add when needed
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

# Advanced relabeling examples (uncomment if needed)
#   relabel_configs:
#     - source_labels: [__address__]
#       target_label: instance